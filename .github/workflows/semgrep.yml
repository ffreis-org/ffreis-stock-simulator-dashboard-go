name: Semgrep (SAST)

on:
  workflow_dispatch:
  schedule:
    - cron: "48 6 25 * *"  # monthly scattered (was: 0 8 * * 1)

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  semgrep:
    permissions:
      contents: read
    uses: FelipeFuhr/ffreis-workflows-go/.github/workflows/go-semgrep.yml@6a9b12a1c8b8a6a8ba0002a8077a1713ddf31be8

