name: Semgrep (SAST)

on:
  workflow_dispatch:
  pull_request:
    branches: [main]
  push:
    branches: [main]
  schedule:
    - cron: "0 8 * * 1" # Mondays 08:00 UTC

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

jobs:
  semgrep:
    uses: FelipeFuhr/ffreis-workflows-go/.github/workflows/go-semgrep.yml@6a9b12a1c8b8a6a8ba0002a8077a1713ddf31be8

