name: Dashboard Commit Checks

on:
  pull_request:
    paths:
      - '**'
      - '.github/workflows/**'
  push:
    branches: [main, master]
    paths:
      - '**'
      - '.github/workflows/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    timeout-minutes: 15
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-go@v5
        with:
          go-version: '1.25.8'
          cache: true
      - name: go mod tidy is clean
        run: |
          go mod tidy
          go mod verify
          files=(go.mod)
          if [ -f go.sum ]; then
            files+=(go.sum)
          fi
          git diff --exit-code -- "${files[@]}" || (echo 'go.mod/go.sum not tidy' && exit 1)
      - name: Format check
        run: |
          out="$(gofmt -l .)"
          if [ -n "${out}" ]; then
            echo "${out}"
            exit 1
          fi
