name: Dashboard Commit Checks

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - '**'
      - '.github/workflows/**'
  push:
    branches: [main, master]
    paths:
      - '**'
      - '.github/workflows/**'

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  checks:
    if: ${{ github.event_name != 'pull_request' || github.event.pull_request.draft == false }}
    timeout-minutes: 15
    permissions:
      contents: read
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6
      - uses: actions/setup-go@40f1582b2485089dde7abd97c1529aa768e1baff # v5
        with:
          go-version: '1.25.8'
          cache: true
      - name: go mod tidy is clean
        run: |
          go mod tidy
          go mod verify
          files=(go.mod)
          if [ -f go.sum ]; then
            files+=(go.sum)
          fi
          git diff --exit-code -- "${files[@]}" || (echo 'go.mod/go.sum not tidy' && exit 1)
      - name: Format check
        run: |
          out="$(gofmt -l .)"
          if [ -n "${out}" ]; then
            echo "${out}"
            exit 1
          fi
