name: DevOps / Stale

on:
  schedule:
    - cron: "1 12 21 * *"  # monthly scattered (was: 0 6 * * 1)
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  stale:
    permissions:
      issues: write
      pull-requests: write
    uses: FelipeFuhr/ffreis-workflows-general/.github/workflows/general-stale.yml@5dfbb4986ceb88f6518fa719da3a255294cf03cf
    with:
      only: "both"
