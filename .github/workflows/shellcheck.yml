name: DevOps / ShellCheck

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
  push:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  shellcheck:
    permissions:
      contents: read
    uses: FelipeFuhr/ffreis-workflows-general/.github/workflows/general-shellcheck.yml@87dcfcaf663040b8e3695e277f1979974936bfa0
    with:
      working-directory: .
      fail-on-error: true
