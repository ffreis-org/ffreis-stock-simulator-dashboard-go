name: DevOps / ShellCheck

on:
  pull_request:
  push:
    branches: [main, master]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  shellcheck:
    uses: FelipeFuhr/ffreis-workflows-general/.github/workflows/general-shellcheck.yml@5dfbb4986ceb88f6518fa719da3a255294cf03cf
    with:
      working-directory: .
      fail-on-error: true
