name: DevOps / Scorecard

on:
  schedule:
    - cron: "55 20 7 * *"  # monthly scattered (was: 0 3 * * 0)
  workflow_dispatch:
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  scorecard:
    permissions:
      id-token: write
      security-events: write
      contents: read
      actions: read
    uses: FelipeFuhr/ffreis-workflows-general/.github/workflows/general-scorecard.yml@5dfbb4986ceb88f6518fa719da3a255294cf03cf
    with:
      upload-sarif: true
