name: DevOps / Go CI

on:
  pull_request:
    types: [opened, synchronize, reopened, ready_for_review]
    paths:
      - "**/*.go"
      - "go.mod"
      - "go.sum"
      - ".github/workflows/**"
  push:
    branches: [main, master]
    paths:
      - "**/*.go"
      - "go.mod"
      - "go.sum"
      - ".github/workflows/**"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  mod-tidy:
    permissions:
      contents: read
    uses: FelipeFuhr/ffreis-workflows-go/.github/workflows/go-mod-tidy-check.yml@288bbf7ff1420e43a0d77c4dc8a39779e8acd1e0
    with:
      go-version: "1.25.8"
      working-directory: "."

  fmt:
    permissions:
      contents: read
    uses: FelipeFuhr/ffreis-workflows-go/.github/workflows/go-fmt.yml@b253b2329a11552b6276781c56f6dc6fd1718710
    with:
      go-version: "1.25.8"
      working-directory: "."

  lint:
    needs: [fmt]
    permissions:
      contents: read
    uses: FelipeFuhr/ffreis-workflows-go/.github/workflows/go-lint.yml@288bbf7ff1420e43a0d77c4dc8a39779e8acd1e0
    with:
      go-version: "1.25.8"
      working-directory: "."

  test:
    if: ${{ !github.event.pull_request.draft }}
    needs: [fmt]
    permissions:
      contents: read
    uses: FelipeFuhr/ffreis-workflows-go/.github/workflows/go-test.yml@288bbf7ff1420e43a0d77c4dc8a39779e8acd1e0
    with:
      go-version: "1.25.8"
      working-directory: "."

